<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutraOS — Maharashtra Institute of Technology ERP</title>
    <meta name="description" content="Enterprise Resource Planning System for Maharashtra Institute of Technology, Chhatrapati Sambhajinagar">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React and ReactDOM Local -->
    <script src="/js/react.js"></script>
    <script src="/js/react-dom.js"></script>
    <!-- Babel Local (for browser JSX parsing) -->
    <script src="/js/babel.js"></script>
    <!-- Lucide Icons Local -->
    <script src="/js/lucide.js"></script>
    <style>
        /* ================================================================
           DESIGN SYSTEM — Ultra Professional, SAP Fiori / Apple Inspired
           ================================================================ */
        :root {
            --color-primary: #0f172a;
            --color-primary-light: #1e293b;
            --color-primary-hover: #334155;
            --color-accent: #3b82f6;
            --color-accent-light: #eff6ff;
            --color-accent-hover: #2563eb;
            --color-bg: #f8fafc;
            --color-sidebar: #ffffff;
            --color-card: #ffffff;
            --color-border: #e2e8f0;
            --color-border-light: #f1f5f9;
            --color-text: #0f172a;
            --color-text-secondary: #475569;
            --color-text-muted: #94a3b8;
            --color-success: #10b981;
            --color-success-bg: #ecfdf5;
            --color-warning: #f59e0b;
            --color-warning-bg: #fffbeb;
            --color-danger: #ef4444;
            --color-danger-bg: #fef2f2;
            --color-info: #0ea5e9;
            --color-info-bg: #f0f9ff;
            
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            
            --sidebar-width: 280px;
            --topbar-height: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ---- SCROLLBAR ---- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ---- ANIMATIONS ---- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        
        /* ---- LOGIN PAGE SPLIT LAYOUT ---- */
        .login-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        .login-brand-side {
            flex: 1;
            background: linear-gradient(135deg, var(--color-primary) 0%, #172554 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }
        
        /* Decorative Background Elements */
        .login-bg-shape1 {
            position: absolute; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(0,0,0,0) 70%);
            top: -200px; right: -100px;
        }
        .login-bg-shape2 {
            position: absolute; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(16,185,129,0.05) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px; left: -100px;
        }
        
        .login-brand-content {
            position: relative;
            z-index: 10;
            max-width: 500px;
        }
        
        .mit-shield {
            width: 64px; height: 64px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: float 6s ease-in-out infinite;
        }
        
        .login-brand-side h1 {
            font-size: 42px; font-weight: 700; line-height: 1.1; margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .login-brand-side p {
            font-size: 18px; color: #94a3b8; font-weight: 300; line-height: 1.5;
        }
        
        .login-form-side {
            flex: 1;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .login-form-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-form-header { margin-bottom: 32px; }
        .login-form-header h2 { font-size: 28px; font-weight: 700; color: var(--color-primary); margin-bottom: 8px; letter-spacing: -0.01em; }
        .login-form-header p { font-size: 15px; color: var(--color-text-secondary); }
        
        /* ---- FORM ELEMENTS ---- */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 600; color: var(--color-primary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 12px 16px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 14px; font-family: var(--font-body);
            color: var(--color-text);
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none; border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-light);
            background: #fff;
        }
        
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 20px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; font-family: var(--font-body);
            cursor: pointer; transition: all 0.2s; border: none;
        }
        .btn-primary {
            background: var(--color-accent); color: white; width: 100%; padding: 14px;
        }
        .btn-primary:hover { background: var(--color-accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-primary:active { transform: translateY(0); }
        
        .btn-action { background: var(--color-primary); color: white; }
        .btn-action:hover { background: var(--color-primary-hover); }
        .btn-outline { background: white; border: 1px solid var(--color-border); color: var(--color-text-secondary); }
        .btn-outline:hover { background: var(--color-bg); color: var(--color-text); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* ---- DEMO RBAC PANEL ---- */
        .demo-panel {
            margin-top: 40px; padding-top: 24px;
            border-top: 1px dashed var(--color-border);
        }
        .demo-panel-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            color: var(--color-text-muted); letter-spacing: 0.05em; margin-bottom: 16px;
        }
        .demo-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .demo-btn {
            background: var(--color-bg); border: 1px solid var(--color-border);
            padding: 8px; border-radius: 6px; cursor: pointer; text-align: left;
            transition: all 0.15s; display: flex; flex-direction: column;
        }
        .demo-btn:hover { border-color: var(--color-accent); background: var(--color-accent-light); }
        .demo-btn span.role { font-size: 11px; font-weight: 600; color: var(--color-primary); }
        .demo-btn span.user { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ---- APP LAYOUT ---- */
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-sidebar);
            border-right: 1px solid var(--color-border);
            display: flex; flex-direction: column;
            z-index: 40;
            transition: all 0.3s;
        }
        .sidebar-header {
            height: var(--topbar-height);
            display: flex; align-items: center; padding: 0 24px;
            border-bottom: 1px solid var(--color-border-light);
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 18px;
            color: var(--color-primary); letter-spacing: -0.02em;
        }
        .sidebar-logo-icon {
            width: 28px; height: 28px; background: var(--color-accent); color: white;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
        }
        
        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px 12px; }
        
        .menu-section { margin-bottom: 24px; }
        .menu-heading {
            font-size: 11px; font-weight: 600; color: var(--color-text-muted);
            text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; margin-bottom: 4px;
            border-radius: var(--radius-sm); color: var(--color-text-secondary);
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover { background: var(--color-bg); color: var(--color-text); }
        .menu-item.active {
            background: var(--color-accent-light); color: var(--color-accent-hover);
            border-left-color: var(--color-accent); font-weight: 600;
        }
        
        .sidebar-footer {
            padding: 16px; border-top: 1px solid var(--color-border-light);
        }
        .user-profile-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: var(--radius-sm);
            background: var(--color-bg); cursor: pointer; transition: background 0.2s;
        }
        .user-profile-card:hover { background: #e2e8f0; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; flex-shrink: 0;
        }
        .user-info { overflow: hidden; }
        .user-name { font-size: 13px; font-weight: 600; color: var(--color-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 11px; color: var(--color-text-secondary); }

        /* MAIN CONTENT AREA */
        .main-wrapper {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* TOPBAR */
        .topbar {
            height: var(--topbar-height); background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px); border-bottom: 1px solid var(--color-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; z-index: 30;
        }
        .breadcrumb { font-size: 14px; color: var(--color-text-secondary); font-weight: 500; }
        .breadcrumb span { color: var(--color-primary); font-weight: 600; }
        
        .topbar-actions { display: flex; align-items: center; gap: 16px; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--color-text-secondary); background: transparent; border: none; cursor: pointer; transition: all 0.2s;
            position: relative;
        }
        .icon-btn:hover { background: var(--color-bg); color: var(--color-primary); }
        .badge-dot {
            position: absolute; top: 8px; right: 8px; width: 8px; height: 8px;
            background: var(--color-danger); border-radius: 50%; border: 2px solid #fff;
            animation: pulse 2s infinite;
        }
        .btn-signout {
            padding: 6px 12px; font-size: 13px; color: var(--color-danger); border: 1px solid transparent;
            background: transparent; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500;
        }
        .btn-signout:hover { background: var(--color-danger-bg); border-color: #fca5a5; }

        /* PAGE CONTENT */
        .page-content {
            flex: 1; overflow-y: auto; padding: 32px;
        }
        
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--color-primary); letter-spacing: -0.02em; margin-bottom: 4px; }
        .page-subtitle { font-size: 14px; color: var(--color-text-secondary); }

        /* ---- CARDS & GRIDS ---- */
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--color-card); border-radius: var(--radius-md); padding: 20px;
            border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        
        .stat-icon {
            width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
        }
        .stat-card.blue .stat-icon { background: var(--color-accent-light); color: var(--color-accent); }
        .stat-card.green .stat-icon { background: var(--color-success-bg); color: var(--color-success); }
        .stat-card.orange .stat-icon { background: var(--color-warning-bg); color: var(--color-warning); }
        .stat-card.purple .stat-icon { background: #f3e8ff; color: #a855f7; }
        
        .stat-value { font-size: 28px; font-weight: 700; color: var(--color-primary); line-height: 1.2; margin-bottom: 4px; }
        .stat-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }

        .content-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        
        .card {
            background: var(--color-card); border-radius: var(--radius-md);
            border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);
            overflow: hidden; margin-bottom: 24px;
        }
        .card-header {
            padding: 16px 20px; border-bottom: 1px solid var(--color-border-light);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-size: 16px; font-weight: 600; color: var(--color-primary); }
        .card-body { padding: 20px; }
        
        /* BANNER */
        .welcome-banner {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
            border-radius: var(--radius-lg); padding: 32px; color: white; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }
        .welcome-text h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em; }
        .welcome-text p { font-size: 15px; opacity: 0.9; }
        .banner-tags { display: flex; gap: 8px; margin-top: 16px; }
        .banner-tag { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; backdrop-filter: blur(4px); }

        /* ---- TABLES ---- */
        .table-responsive { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600;
            color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em;
            border-bottom: 1px solid var(--color-border); background: #f8fafc;
        }
        .data-table td { padding: 14px 16px; border-bottom: 1px solid var(--color-border-light); color: var(--color-text); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr { transition: background 0.15s; }
        .data-table tbody tr:hover { background: #f1f5f9; }

        /* ---- BADGES ---- */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
        .badge-success { background: var(--color-success-bg); color: var(--color-success); border: 1px solid #a7f3d0; }
        .badge-warning { background: var(--color-warning-bg); color: var(--color-warning); border: 1px solid #fde68a; }
        .badge-danger { background: var(--color-danger-bg); color: var(--color-danger); border: 1px solid #fecaca; }
        .badge-info { background: var(--color-info-bg); color: var(--color-info); border: 1px solid #bae6fd; }
        .badge-primary { background: var(--color-accent-light); color: var(--color-accent); border: 1px solid #bfdbfe; }

        /* ---- NOTICES LIST ---- */
        .notice-list { display: flex; flex-direction: column; gap: 12px; }
        .notice-item {
            padding: 12px; border: 1px solid var(--color-border-light); border-radius: var(--radius-sm);
            display: flex; gap: 12px; transition: all 0.2s; cursor: pointer;
        }
        .notice-item:hover { border-color: var(--color-accent); background: var(--color-accent-light); }
        .notice-date {
            background: var(--color-bg); padding: 8px; border-radius: 6px; text-align: center;
            min-width: 50px; display: flex; flex-direction: column; justify-content: center;
        }
        .notice-date .day { font-size: 18px; font-weight: 700; color: var(--color-primary); line-height: 1; }
        .notice-date .month { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; margin-top: 4px; }
        .notice-content h4 { font-size: 14px; font-weight: 600; color: var(--color-text); margin-bottom: 4px; }
        .notice-content p { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* ---- EMPTY STATES ---- */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--color-text-muted); }
        .empty-state-icon { margin-bottom: 16px; opacity: 0.5; display: inline-flex; background: var(--color-bg); padding: 16px; border-radius: 50%; }
        .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--color-primary); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; max-width: 300px; margin: 0 auto; }

        /* ---- TOAST SYSTEM ---- */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: white; border-radius: var(--radius-sm); padding: 12px 16px;
            box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px;
            min-width: 300px; animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-left: 4px solid var(--color-primary);
        }
        .toast.success { border-left-color: var(--color-success); }
        .toast.error { border-left-color: var(--color-danger); }
        .toast-title { font-size: 14px; font-weight: 600; color: var(--color-text); }
        .toast-desc { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }

        @media (max-width: 1024px) {
            .content-layout { grid-template-columns: 1fr; }
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); }
            .login-brand-side { display: none; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ============================================================
        // ICON COMPONENT
        // ============================================================
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, nameAttr: 'data-lucide', attrs: { class: className }});
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        // ============================================================
        // MENUS DEFINITION
        // ============================================================
        const MENU_STRUCTURE = {
            'STUDENT': [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { section: 'Academics', items: [
                    { id: 'academics', label: 'Academic Record', icon: 'graduation-cap' },
                    { id: 'attendance', label: 'My Attendance', icon: 'calendar-check' },
                    { id: 'timetable', label: 'Class Timetable', icon: 'calendar' }
                ]},
                { section: 'Services', items: [
                    { id: 'fees', label: 'Fee Payment', icon: 'credit-card' },
                    { id: 'library', label: 'Library Catalog', icon: 'book' },
                    { id: 'hostel', label: 'Hostel & Gatepass', icon: 'home' }
                ]},
                { section: 'Career', items: [
                    { id: 'placements', label: 'Placements', icon: 'briefcase' }
                ]}
            ],
            'FACULTY': [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { section: 'Academics', items: [
                    { id: 'attendance_entry', label: 'Attendance Entry', icon: 'check-square' },
                    { id: 'timetable', label: 'My Timetable', icon: 'calendar' },
                    { id: 'course_mgmt', label: 'Course Files', icon: 'folder' }
                ]},
                { section: 'Examination', items: [
                    { id: 'marks_entry', label: 'Marks Entry', icon: 'edit-3' },
                    { id: 'evaluate', label: 'Paper Evaluation', icon: 'file-text' }
                ]},
                { section: 'Personal', items: [
                    { id: 'leave', label: 'Leave Management', icon: 'calendar-x' },
                    { id: 'appraisal', label: 'Appraisal Form', icon: 'trending-up' }
                ]}
            ],
            'HOD': [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { section: 'Department', items: [
                    { id: 'faculty_list', label: 'Faculty Directory', icon: 'users' },
                    { id: 'students_list', label: 'Student Records', icon: 'user' }
                ]},
                { section: 'Approvals', items: [
                    { id: 'leave_approvals', label: 'Leave Approvals', icon: 'check-circle' },
                    { id: 'gatepass_approvals', label: 'Gatepass Requests', icon: 'file-signature' }
                ]}
            ]
        };

        // Fallback menu for other admin roles
        const ADMIN_MENU = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { section: 'Management', items: [
                { id: 'students_list', label: 'All Students', icon: 'users' },
                { id: 'faculty_list', label: 'All Faculty', icon: 'user' },
                { id: 'departments', label: 'Departments', icon: 'building' }
            ]}
        ];

        // ============================================================
        // QUICK ACCESS DEMO ACCOUNTS
        // ============================================================
        const DEMO_ACCOUNTS = [
            { role: 'Student', user: 'mit2024cse001', pass: 'sutraos_secure_pass123' },
            { role: 'Faculty', user: 'faculty_seema', pass: 'sutraos_secure_pass123' },
            { role: 'HOD', user: 'hod_cse', pass: 'sutraos_secure_pass123' },
            { role: 'Principal', user: 'principal', pass: 'sutraos_secure_pass123' },
            { role: 'Admin', user: 'inst_admin', pass: 'sutraos_secure_pass123' }
        ];

        // ============================================================
        // TOAST CONTEXT
        // ============================================================
        const ToastManager = {
            add: null // Assigned in App
        };

        // ============================================================
        // MAIN APP COMPONENT
        // ============================================================
        const App = () => {
            const [authState, setAuthState] = useState({ token: '', user: null });
            const [loginInput, setLoginInput] = useState({ username: '', password: '' });
            const [loginStatus, setLoginStatus] = useState({ loading: false, error: '' });
            
            const [activePage, setActivePage] = useState('dashboard');
            const [collapsedSections, setCollapsedSections] = useState({});
            
            const [toasts, setToasts] = useState([]);
            
            // Global Data
            const [dashStats, setDashStats] = useState(null);

            // Toast utility
            const showToast = (title, desc, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, title, desc, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };
            ToastManager.add = showToast;

            // ---- LOGIN HANDLER ----
            const handleLogin = async (e, directCreds = null) => {
                if (e) e.preventDefault();
                setLoginStatus({ loading: true, error: '' });
                const username = directCreds ? directCreds.user : loginInput.username;
                const password = directCreds ? directCreds.pass : loginInput.password;
                
                try {
                    const res = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok && data.token) {
                        setAuthState({ token: data.token, user: data.user });
                        setActivePage('dashboard');
                        fetchDashboardStats(data.token);
                    } else {
                        setLoginStatus({ loading: false, error: data.error || 'Authentication failed' });
                    }
                } catch (err) {
                    // Fallback mock login for UI demonstration if API is down
                    if (password === 'sutraos_secure_pass123') {
                        setAuthState({
                            token: 'mock_jwt_token',
                            user: { system_role: directCreds?.role?.toUpperCase() || 'STUDENT', first_name: 'Demo', last_name: 'User', department_code: 'CSE' }
                        });
                        setActivePage('dashboard');
                    } else {
                        setLoginStatus({ loading: false, error: 'Server connection failed.' });
                    }
                }
            };

            const handleLogout = () => {
                setAuthState({ token: '', user: null });
                setLoginInput({ username: '', password: '' });
                setDashStats(null);
            };

            const fetchDashboardStats = async (token) => {
                try {
                    const res = await fetch('/api/v1/dashboard/stats', { headers: { 'Authorization': `Bearer ${token}` }});
                    if (res.ok) {
                        const data = await res.json();
                        setDashStats(data);
                    }
                } catch(e) { console.error('Stats load failed'); }
            };

            const toggleSection = (sectionName) => {
                setCollapsedSections(prev => ({ ...prev, [sectionName]: !prev[sectionName] }));
            };

            // ============================================================
            // VIEWS: DASHBOARDS BY ROLE
            // ============================================================
            
            const StudentDashboard = () => (
                <div className="animate-slide-up">
                    <div className="welcome-banner">
                        <div className="welcome-text">
                            <h2>Welcome back, {authState.user.first_name}</h2>
                            <p>Here's your academic summary for the current semester.</p>
                            <div className="banner-tags">
                                <span className="banner-tag">{authState.user.department_code || 'B.Tech'}</span>
                                <span className="banner-tag">Semester {dashStats?.semester || 6}</span>
                                <span className="banner-tag">Roll: {authState.user.username.toUpperCase()}</span>
                            </div>
                        </div>
                        <div style={{opacity: 0.8}}><Icon name="graduation-cap" size={80} /></div>
                    </div>
                    
                    <div className="dashboard-grid">
                        <div className="stat-card blue">
                            <div className="stat-icon"><Icon name="trending-up" /></div>
                            <div className="stat-value">{dashStats?.cgpa?.toFixed(2) || '8.45'}</div>
                            <div className="stat-label">Current CGPA</div>
                        </div>
                        <div className="stat-card green">
                            <div className="stat-icon"><Icon name="check-circle" /></div>
                            <div className="stat-value">{dashStats?.attendance_pct || 82}%</div>
                            <div className="stat-label">Overall Attendance</div>
                        </div>
                        <div className="stat-card purple">
                            <div className="stat-icon"><Icon name="award" /></div>
                            <div className="stat-value">124</div>
                            <div className="stat-label">Credits Earned</div>
                        </div>
                        <div className="stat-card orange">
                            <div className="stat-icon"><Icon name="indian-rupee" /></div>
                            <div className="stat-value">₹0.00</div>
                            <div className="stat-label">Outstanding Fees</div>
                        </div>
                    </div>

                    <div className="content-layout">
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Today's Schedule</h3></div>
                            <div className="card-body" style={{padding: 0}}>
                                <table className="data-table">
                                    <thead><tr><th>Time</th><th>Subject</th><th>Type</th><th>Room</th></tr></thead>
                                    <tbody>
                                        <tr><td>09:00 AM</td><td><strong>Data Structures</strong></td><td><span className="badge badge-info">Lecture</span></td><td>Room 301</td></tr>
                                        <tr><td>10:00 AM</td><td><strong>Operating Systems</strong></td><td><span className="badge badge-info">Lecture</span></td><td>Room 302</td></tr>
                                        <tr><td>11:15 AM</td><td><strong>Web Tech Lab</strong></td><td><span className="badge badge-warning">Practical</span></td><td>Lab 4</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Notice Board</h3></div>
                            <div className="card-body">
                                <div className="notice-list">
                                    <div className="notice-item">
                                        <div className="notice-date"><span className="day">12</span><span className="month">Oct</span></div>
                                        <div className="notice-content"><h4>End Sem Timetable</h4><p>The final examination schedule is released.</p></div>
                                    </div>
                                    <div className="notice-item">
                                        <div className="notice-date"><span className="day">08</span><span className="month">Oct</span></div>
                                        <div className="notice-content"><h4>Fee Payment Deadline</h4><p>Last date for semester fee payment is 25th Oct.</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const FacultyDashboard = () => (
                <div className="animate-slide-up">
                    <div className="welcome-banner" style={{background: 'linear-gradient(135deg, #1e293b 0%, #334155 100%)'}}>
                        <div className="welcome-text">
                            <h2>Hello, {authState.user.first_name} {authState.user.last_name}</h2>
                            <p>Faculty Portal • {authState.user.department_code} Department</p>
                        </div>
                        <div style={{opacity: 0.8}}><Icon name="briefcase" size={80} /></div>
                    </div>
                    
                    <div className="dashboard-grid">
                        <div className="stat-card blue">
                            <div className="stat-icon"><Icon name="calendar" /></div>
                            <div className="stat-value">4</div>
                            <div className="stat-label">Classes Today</div>
                        </div>
                        <div className="stat-card orange">
                            <div className="stat-icon"><Icon name="clock" /></div>
                            <div className="stat-value">2</div>
                            <div className="stat-label">Pending Attendance</div>
                        </div>
                        <div className="stat-card green">
                            <div className="stat-icon"><Icon name="check-square" /></div>
                            <div className="stat-value">45</div>
                            <div className="stat-label">Papers to Evaluate</div>
                        </div>
                        <div className="stat-card purple">
                            <div className="stat-icon"><Icon name="calendar-x" /></div>
                            <div className="stat-value">12</div>
                            <div className="stat-label">Leaves Balance</div>
                        </div>
                    </div>
                </div>
            );

            // ============================================================
            // VIEWS: FUNCTIONAL PAGES
            // ============================================================
            
            const AttendanceEntryPage = () => {
                const [saving, setSaving] = useState(false);
                const mockStudents = [
                    { roll: 'CSE001', name: 'Aarav Patel', status: true },
                    { roll: 'CSE002', name: 'Diya Sharma', status: true },
                    { roll: 'CSE003', name: 'Rohan Gupta', status: false },
                    { roll: 'CSE004', name: 'Ananya Singh', status: true }
                ];
                const [students, setStudents] = useState(mockStudents);

                const toggleAll = () => {
                    const allPresent = students.every(s => s.status);
                    setStudents(students.map(s => ({ ...s, status: !allPresent })));
                };

                const toggleStudent = (idx) => {
                    const newS = [...students];
                    newS[idx].status = !newS[idx].status;
                    setStudents(newS);
                };

                const handleSave = () => {
                    setSaving(true);
                    setTimeout(() => {
                        setSaving(false);
                        ToastManager.add('Success', 'Attendance marked successfully', 'success');
                        setActivePage('dashboard');
                    }, 800);
                };

                return (
                    <div className="animate-fade-in">
                        <div className="page-header">
                            <h1 className="page-title">Attendance Entry</h1>
                            <p className="page-subtitle">Mark daily attendance for your mapped courses.</p>
                        </div>
                        <div className="card">
                            <div className="card-body" style={{display: 'flex', gap: '16px', background: 'var(--color-bg)'}}>
                                <select className="form-input" style={{width: '200px'}}><option>CS301 - Data Structures</option></select>
                                <select className="form-input" style={{width: '150px'}}><option>Div A - Batch 1</option></select>
                                <input type="date" className="form-input" style={{width: '180px'}} defaultValue={new Date().toISOString().split('T')[0]} />
                                <button className="btn btn-primary" style={{width: 'auto'}}>Load Students</button>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-header">
                                <h3 className="card-title">Student List (4 Students)</h3>
                                <button className="btn btn-outline btn-sm" onClick={toggleAll}>Toggle All Present/Absent</button>
                            </div>
                            <div className="card-body" style={{padding: 0}}>
                                <table className="data-table">
                                    <thead><tr><th style={{width: '60px'}}>#</th><th>Roll No</th><th>Student Name</th><th>Status</th><th>Action</th></tr></thead>
                                    <tbody>
                                        {students.map((s, i) => (
                                            <tr key={s.roll} style={{background: s.status ? '' : 'var(--color-danger-bg)'}}>
                                                <td>{i+1}</td>
                                                <td style={{fontFamily: 'monospace', fontWeight: 600}}>{s.roll}</td>
                                                <td>{s.name}</td>
                                                <td>{s.status ? <span className="badge badge-success">Present</span> : <span className="badge badge-danger">Absent</span>}</td>
                                                <td>
                                                    <input type="checkbox" checked={s.status} onChange={() => toggleStudent(i)} style={{width: '18px', height: '18px', cursor: 'pointer'}} />
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="card-body" style={{borderTop: '1px solid var(--color-border-light)', display: 'flex', justifyContent: 'flex-end'}}>
                                <button className="btn btn-primary" style={{width: '200px'}} onClick={handleSave} disabled={saving}>
                                    {saving ? 'Saving...' : 'Submit Attendance'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const LeaveManagementPage = () => {
                return (
                    <div className="animate-fade-in">
                        <div className="page-header">
                            <h1 className="page-title">Leave Management</h1>
                            <p className="page-subtitle">Apply for leaves and view history.</p>
                        </div>
                        <div className="content-layout">
                            <div className="card">
                                <div className="card-header"><h3 className="card-title">Apply for Leave</h3></div>
                                <div className="card-body">
                                    <div className="form-group">
                                        <label className="form-label">Leave Type</label>
                                        <select className="form-input">
                                            <option>Casual Leave (CL)</option>
                                            <option>Earned Leave (EL)</option>
                                            <option>Medical Leave (ML)</option>
                                        </select>
                                    </div>
                                    <div style={{display: 'flex', gap: '16px'}}>
                                        <div className="form-group" style={{flex: 1}}>
                                            <label className="form-label">From Date</label>
                                            <input type="date" className="form-input" />
                                        </div>
                                        <div className="form-group" style={{flex: 1}}>
                                            <label className="form-label">To Date</label>
                                            <input type="date" className="form-input" />
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Substitute Faculty (Optional)</label>
                                        <select className="form-input"><option>-- Select Faculty --</option><option>Prof. Sharma</option></select>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Reason</label>
                                        <textarea className="form-input" rows="3" placeholder="Enter reason..."></textarea>
                                    </div>
                                    <button className="btn btn-primary" onClick={() => ToastManager.add('Submitted', 'Leave application sent to HOD for approval.', 'success')}>Apply Leave</button>
                                </div>
                            </div>
                            <div className="card">
                                <div className="card-header"><h3 className="card-title">Leave Balances</h3></div>
                                <div className="card-body">
                                    <div style={{display: 'flex', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid var(--color-border)'}}>
                                        <span style={{fontWeight: 500}}>Casual Leave (CL)</span><span className="badge badge-success">8 days</span>
                                    </div>
                                    <div style={{display: 'flex', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid var(--color-border)'}}>
                                        <span style={{fontWeight: 500}}>Earned Leave (EL)</span><span className="badge badge-info">15 days</span>
                                    </div>
                                    <div style={{display: 'flex', justifyContent: 'space-between', padding: '12px 0'}}>
                                        <span style={{fontWeight: 500}}>Medical Leave (ML)</span><span className="badge badge-warning">10 days</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const PlaceholderPage = ({ title }) => (
                <div className="animate-fade-in">
                    <div className="page-header">
                        <h1 className="page-title">{title}</h1>
                        <p className="page-subtitle">Module under development.</p>
                    </div>
                    <div className="card">
                        <div className="empty-state">
                            <div className="empty-state-icon"><Icon name="hammer" size={48} /></div>
                            <h3>Coming Soon</h3>
                            <p>This module is currently being integrated into the SutraOS platform.</p>
                        </div>
                    </div>
                </div>
            );

            // Router
            const renderPageContent = () => {
                if (activePage === 'dashboard') {
                    if (authState.user.system_role === 'STUDENT') return <StudentDashboard />;
                    if (authState.user.system_role === 'FACULTY') return <FacultyDashboard />;
                    return <StudentDashboard />; // Fallback
                }
                if (activePage === 'attendance_entry') return <AttendanceEntryPage />;
                if (activePage === 'leave') return <LeaveManagementPage />;
                
                // Capitalize first letter for placeholder title
                const title = activePage.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                return <PlaceholderPage title={title} />;
            };

            // ============================================================
            // RENDER LOGIC
            // ============================================================
            
            if (!authState.token) {
                return (
                    <div className="login-wrapper">
                        <div className="login-brand-side">
                            <div className="login-bg-shape1"></div>
                            <div className="login-bg-shape2"></div>
                            <div className="login-brand-content">
                                <div className="mit-shield">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                                </div>
                                <h1 className="animate-slide-up">Maharashtra Institute<br/>of Technology</h1>
                                <p className="animate-slide-up" style={{animationDelay: '0.1s'}}>Chhatrapati Sambhajinagar (Aurangabad)</p>
                                <div className="animate-slide-up" style={{marginTop: '40px', padding: '16px', background: 'rgba(255,255,255,0.1)', borderRadius: '12px', backdropFilter: 'blur(10px)', border: '1px solid rgba(255,255,255,0.1)'}}>
                                    <div style={{fontSize: '12px', textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.8, marginBottom: '4px'}}>Powered By</div>
                                    <div style={{fontSize: '20px', fontWeight: 700, letterSpacing: '-0.02em'}}>SutraOS Platform v2.0</div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="login-form-side">
                            <div className="login-form-container animate-fade-in">
                                <div className="login-form-header">
                                    <h2>Sign in to ERP</h2>
                                    <p>Enter your institutional credentials to access your account.</p>
                                </div>
                                
                                {loginStatus.error && (
                                    <div style={{background: 'var(--color-danger-bg)', color: 'var(--color-danger)', padding: '12px 16px', borderRadius: '8px', marginBottom: '20px', fontSize: '13px', fontWeight: 500, borderLeft: '4px solid var(--color-danger)'}}>
                                        {loginStatus.error}
                                    </div>
                                )}
                                
                                <form onSubmit={(e) => handleLogin(e, null)}>
                                    <div className="form-group">
                                        <label className="form-label">Username / Email</label>
                                        <input className="form-input" type="text" placeholder="username@mit.asia" value={loginInput.username} onChange={e => setLoginInput({...loginInput, username: e.target.value})} required />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Password</label>
                                        <input className="form-input" type="password" placeholder="••••••••" value={loginInput.password} onChange={e => setLoginInput({...loginInput, password: e.target.value})} required />
                                    </div>
                                    <button type="submit" className="btn btn-primary" disabled={loginStatus.loading}>
                                        {loginStatus.loading ? 'Authenticating...' : 'Sign In'}
                                    </button>
                                </form>
                                
                                <div className="demo-panel">
                                    <div className="demo-panel-title">Demo Quick Access (Auto-Login)</div>
                                    <div className="demo-grid">
                                        {DEMO_ACCOUNTS.map(acc => (
                                            <button key={acc.user} className="demo-btn" onClick={(e) => { e.preventDefault(); handleLogin(null, acc); }}>
                                                <span className="role">{acc.role}</span>
                                                <span className="user">{acc.user}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ---- LOGGED IN VIEW ----
            const menuData = MENU_STRUCTURE[authState.user.system_role] || ADMIN_MENU;

            return (
                <div className="app-container">
                    {/* Toast Container */}
                    <div className="toast-container">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast ${t.type}`}>
                                <div>
                                    <div className="toast-title">{t.title}</div>
                                    <div className="toast-desc">{t.desc}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Sidebar */}
                    <aside className="sidebar">
                        <div className="sidebar-header">
                            <div className="sidebar-logo">
                                <div className="sidebar-logo-icon"><Icon name="box" size={16} /></div>
                                MIT ERP
                            </div>
                        </div>
                        <div className="sidebar-content">
                            {menuData.map((item, idx) => {
                                if (item.section) {
                                    const isCollapsed = collapsedSections[item.section];
                                    return (
                                        <div key={idx} className="menu-section">
                                            <div className="menu-heading" onClick={() => toggleSection(item.section)}>
                                                {item.section}
                                                <Icon name={isCollapsed ? 'chevron-down' : 'chevron-up'} size={14} />
                                            </div>
                                            {!isCollapsed && item.items.map(subItem => (
                                                <div key={subItem.id} className={`menu-item ${activePage === subItem.id ? 'active' : ''}`} onClick={() => setActivePage(subItem.id)}>
                                                    <Icon name={subItem.icon} size={16} />
                                                    {subItem.label}
                                                </div>
                                            ))}
                                        </div>
                                    );
                                } else {
                                    return (
                                        <div key={item.id} className="menu-section">
                                            <div className={`menu-item ${activePage === item.id ? 'active' : ''}`} onClick={() => setActivePage(item.id)}>
                                                <Icon name={item.icon} size={16} />
                                                {item.label}
                                            </div>
                                        </div>
                                    );
                                }
                            })}
                        </div>
                        <div className="sidebar-footer">
                            <div className="user-profile-card">
                                <div className="avatar">
                                    {authState.user.first_name?.charAt(0)}{authState.user.last_name?.charAt(0)}
                                </div>
                                <div className="user-info">
                                    <div className="user-name">{authState.user.first_name} {authState.user.last_name}</div>
                                    <div className="user-role">{authState.user.system_role.replace('_', ' ')}</div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <div className="main-wrapper">
                        {/* Topbar */}
                        <header className="topbar">
                            <div className="breadcrumb">
                                Platform <span>/</span> {activePage.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}
                            </div>
                            <div className="topbar-actions">
                                <button className="icon-btn"><Icon name="search" size={18} /></button>
                                <button className="icon-btn">
                                    <Icon name="bell" size={18} />
                                    <span className="badge-dot"></span>
                                </button>
                                <div style={{width: '1px', height: '24px', background: 'var(--color-border)', margin: '0 8px'}}></div>
                                <button className="btn-signout" onClick={handleLogout}>Sign Out</button>
                            </div>
                        </header>

                        {/* Page Content */}
                        <main className="page-content">
                            {renderPageContent()}
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
