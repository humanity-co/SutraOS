
services:
  # HAProxy / Nginx Load Balancer to distribute traffic
  lb:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  # Backend API service with hot reload for development
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - DATABASE_URL=postgresql+asyncpg://sutra:secret@db/sutraos
      - WORKERS_PER_CORE=2
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  # Stateful Database Cluster (Read-Replicas ready)
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=sutra
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=sutraos
    volumes:
      - sutraos_pgdata:/var/lib/postgresql/data

  # Redis for Stateless JWT Token Caching and Rate Limiting
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Frontend service with Vite dev server for development
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --cors
    depends_on:
      - api

volumes:
  sutraos_pgdata:
